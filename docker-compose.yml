services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
      - backend/.env
    ports:
      - "4000:4000"
    volumes:
      - uploads:/app/uploads

  db-init:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
      - backend/.env
    command: node src/db/init.js
    restart: on-failure

  frontend:
    build:
      context: .
      args:
        VITE_RAZORPAY_KEY_ID: ${VITE_RAZORPAY_KEY_ID}
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  pgdata:
  uploads:
