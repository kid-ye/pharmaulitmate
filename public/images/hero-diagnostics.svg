<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Diagnostic medical equipment</title>
  <desc id="desc">A diagnostic kit with stethoscope, thermometer, pulse oximeter, and medicine containers.</desc>
  <defs>
