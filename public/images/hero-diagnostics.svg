      <stop offset="1" stop-color="#95b7c9"/>
    </linearGradient>
    <filter id="shadow" color-interpolation-filters="sRGB" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#1f3f4f" flood-opacity=".2"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
