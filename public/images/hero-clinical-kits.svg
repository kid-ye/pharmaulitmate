    <rect x="365" y="280" width="250" height="105" rx="40" fill="none" stroke="#6f8587" stroke-width="28"/>
    <path d="M390 488 h200 v46 h-200 z" fill="#d84b4b"/>
    <path d="M467 410 h46 v200 h-46 z" fill="#d84b4b"/>
