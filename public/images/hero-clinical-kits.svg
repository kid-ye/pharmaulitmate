<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">Clinical medical kits</title>
  <desc id="desc">Medical bags, diagnostic tools, bottles, gloves, and bandages arranged on a clean counter.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop stop-color="#f6fbfb"/>
      <stop offset=".52" stop-color="#dcefed"/>
      <stop offset="1" stop-color="#9fc6c9"/>
    </linearGradient>
    <linearGradient id="bag" x1="0" x2="1">
      <stop stop-color="#fdfefe"/>
      <stop offset="1" stop-color="#d6e6e7"/>
    </linearGradient>
    <filter id="shadow" color-interpolation-filters="sRGB" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#234448" flood-opacity=".2"/>
    </filter>
  </defs>
  <rect width="1600" height="900" fill="url(#bg)"/>
  <path d="M0 620 C270 560 390 720 620 650 C870 575 1080 520 1600 610 L1600 900 L0 900 Z" fill="#eef7f6"/>
