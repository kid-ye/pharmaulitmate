    <rect x="722" y="512" width="68" height="48" rx="8" fill="#6fb6b6"/>
    <rect x="805" y="455" width="100" height="185" rx="26" fill="#eaf4f3"/>
    <rect x="830" y="405" width="50" height="72" rx="13" fill="#d84b4b"/>
