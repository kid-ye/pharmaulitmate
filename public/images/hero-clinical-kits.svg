    <rect x="980" y="245" width="250" height="100" rx="50" fill="none" stroke="#516f74" stroke-width="30"/>
    <rect x="1035" y="395" width="140" height="38" rx="6" fill="#d84b4b"/>
    <rect x="1086" y="344" width="38" height="140" rx="6" fill="#d84b4b"/>
